<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>课程中心 | Northstar 英语学习平台</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="courses">
    <div class="app-shell">
      <header class="platform-topbar">
        <div>
          <p class="eyebrow">课程中心</p>
          <h1>课程不是越多越好，而是和你的计划对齐。</h1>
          <p class="intro">资源库并入课程中心，只保留当前阶段最需要的课程组，不做无限材料列表。</p>
        </div>
        <nav class="primary-nav" aria-label="一级导航">
          <a class="primary-nav__link" href="/plan.html">计划</a>
          <a class="primary-nav__link is-active" href="/courses.html">课程</a>
          <a class="primary-nav__link" href="/training.html">今日学习</a>
          <a class="primary-nav__link" href="/review.html">回顾</a>
        </nav>
      </header>

      <main class="workspace workspace--platform">
        <section class="panel panel--hero">
          <div class="hero-grid">
            <div class="panel__stack">
              <p class="eyebrow">当前课程组</p>
              <h2 id="courses-current-title">先学“生活高频事务”这一组。</h2>
              <p class="support-copy" id="courses-current-copy">你当前阶段先收生活高频场景，等这一组稳定后，再进入工作沟通。</p>
            </div>
            <div class="stat-grid stat-grid--single">
              <div class="stat-card">
                <span>当前阶段</span>
                <strong id="courses-phase">生活高频事务应对</strong>
              </div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">课程列表</p>
              <h2>本阶段先学这些课。</h2>
            </div>
          </div>
          <div class="course-grid" id="course-list"></div>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
