<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>训练完成 | Northstar 英语训练台</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="completion">
    <div class="app-shell">
      <main class="workspace workspace--single">
        <section class="panel panel--completion" aria-labelledby="completion-title">
          <div class="panel__stack">
            <p class="eyebrow">完成页</p>
            <h1 id="completion-title">今天这轮已经完成。</h1>
            <p class="hero-copy">这一轮到这里就结束。先停在这里，把完成感留下，明天再继续。</p>
          </div>

          <div class="completion-grid">
            <div class="summary-card summary-card--signal">
              <p class="summary-card__label">今天练了什么</p>
              <strong id="completion-trained">Listening with pronunciation support</strong>
              <span id="completion-goal">Catch key meaning before translating in your head.</span>
            </div>
            <div class="summary-card">
              <p class="summary-card__label">明天建议</p>
              <strong id="completion-next-time">20 分钟训练</strong>
              <span id="completion-reflection">如果今天的节奏刚刚好，明天就继续保持同样的时间桶。</span>
            </div>
          </div>

          <div class="feature-block feature-block--quiet">
            <p class="mini-label">轻量进度提示</p>
            <p class="support-copy" id="completion-streak">连续天数和徽章都只是辅助。今天能完成这一轮，才是主结果。</p>
          </div>

          <a class="secondary-action secondary-action--wide" href="/">回到明天的入口</a>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
