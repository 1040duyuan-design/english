<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>训练完成 | Northstar 英语训练台</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="completion">
    <div class="app-shell">
      <main class="workspace workspace--single">
        <section class="panel panel--completion" aria-labelledby="completion-title">
          <div class="panel__stack">
            <p class="eyebrow">完成页</p>
            <h1 id="completion-title">今天这轮已经完成。</h1>
            <p class="hero-copy" id="completion-scene">今天练的是一个具体澳洲场景，而不是泛练习。</p>
          </div>

          <div class="completion-grid">
            <div class="summary-card summary-card--signal">
              <p class="summary-card__label">今天完成了哪 3 步</p>
              <ol class="completion-list" id="completion-steps"></ol>
            </div>
            <div class="summary-card">
              <p class="summary-card__label">今天最该记住的一句话</p>
              <strong id="completion-key-line">I'd like to book an inspection for Saturday morning.</strong>
              <span>把这句留下，明天继续用得上。</span>
            </div>
          </div>

          <div class="feature-block feature-block--quiet completion-next">
            <p class="mini-label">明天建议继续什么</p>
            <strong id="completion-next-time">20 分钟训练</strong>
            <p class="support-copy" id="completion-reflection">如果今天的节奏刚刚好，明天就继续保持同样的时间桶。</p>
          </div>

          <a class="secondary-action secondary-action--wide" href="/">回到明天的入口</a>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
