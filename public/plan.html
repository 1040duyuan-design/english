<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>计划总览 | Northstar 英语学习平台</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="plan">
    <div class="app-shell">
      <header class="platform-topbar">
        <div>
          <p class="eyebrow">计划总览</p>
          <h1 id="plan-title">这是你的英语学习计划。</h1>
          <p class="intro" id="plan-intro">你现在不需要自己安排每天学什么。系统已经把目标、周期、阶段和今天入口都排好了。</p>
        </div>
        <nav class="primary-nav" aria-label="一级导航">
          <a class="primary-nav__link is-active" href="/plan.html">计划</a>
          <a class="primary-nav__link" href="/courses.html">课程</a>
          <a class="primary-nav__link" href="/training.html">今日学习</a>
          <a class="primary-nav__link" href="/review.html">回顾</a>
        </nav>
      </header>

      <main class="workspace workspace--platform">
        <section class="panel panel--hero">
          <div class="hero-grid">
            <div class="panel__stack">
              <p class="eyebrow">总目标</p>
              <h2 id="plan-goal">去澳大利亚后，能独立租房、处理生活事务，并完成基础工作沟通。</h2>
              <p class="support-copy" id="plan-cycle">总周期会根据你的目标时间自动生成。</p>
            </div>
            <div class="progress-card">
              <span>当前进度</span>
              <strong id="plan-progress-text">Day 18 / 60</strong>
              <div class="progress-bar"><span id="plan-progress-bar"></span></div>
              <p class="support-copy" id="plan-phase-copy">当前阶段：生活高频事务应对</p>
            </div>
          </div>
        </section>

        <section class="platform-grid">
          <section class="panel">
            <div class="section-heading">
              <div>
                <p class="eyebrow">当前阶段</p>
                <h2>你现在先攻这一段。</h2>
              </div>
            </div>
            <div class="phase-list" id="plan-phases"></div>
          </section>

          <section class="panel">
            <div class="section-heading">
              <div>
                <p class="eyebrow">今天入口</p>
                <h2>今天按这组任务继续推进。</h2>
              </div>
            </div>
            <div class="today-entry">
              <p class="mini-label" id="plan-today-label">今天学 20 分钟</p>
              <strong id="plan-today-scene">租房电话预约看房</strong>
              <p class="support-copy" id="plan-today-summary">主技能、资源类型和完成标准会提前告诉你。</p>
              <a class="primary-action primary-action--wide" href="/training.html">开始今天学习</a>
            </div>
          </section>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
