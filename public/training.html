<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>今日学习 | Northstar 英语学习平台</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="today">
    <div class="app-shell">
      <header class="platform-topbar">
        <div>
          <p class="eyebrow">今日学习</p>
          <h1 id="today-title">今天只完成这一轮学习。</h1>
          <p class="intro" id="today-intro">
            今天学完这组内容，你的计划会往前推进 1 天。
          </p>
        </div>
        <nav class="primary-nav" aria-label="一级导航">
          <a class="primary-nav__link" href="/plan.html">计划</a>
          <a class="primary-nav__link" href="/courses.html">课程</a>
          <a class="primary-nav__link is-active" href="/training.html">今日学习</a>
          <a class="primary-nav__link" href="/review.html">回顾</a>
        </nav>
      </header>

      <main class="workspace workspace--platform">
        <section class="panel panel--hero">
          <div class="hero-grid">
            <div class="panel__stack">
              <p class="eyebrow">今天的学习单</p>
              <h2 id="today-goal">今天先把租房电话预约场景走通。</h2>
              <p class="support-copy" id="today-scene">场景：澳洲租房，看房预约电话</p>
            </div>
            <div class="stat-grid">
              <div class="stat-card">
                <span>今日时长</span>
                <strong id="today-duration">20 分钟</strong>
              </div>
              <div class="stat-card">
                <span>主技能</span>
                <strong id="today-main-skill">Listening</strong>
              </div>
              <div class="stat-card">
                <span>辅助技能</span>
                <strong id="today-support-skill">Speaking</strong>
              </div>
              <div class="stat-card">
                <span>完成标准</span>
                <strong id="today-done-means">完成 3 个动作，并说出 1 句关键请求。</strong>
              </div>
            </div>
          </div>
        </section>

        <section class="platform-grid platform-grid--today">
          <section class="panel">
            <div class="section-heading">
              <div>
                <p class="eyebrow">今日学习内容</p>
                <h2>今天学什么</h2>
              </div>
            </div>
            <ol class="card-list" id="today-actions"></ol>
          </section>

          <section class="panel">
            <div class="section-heading">
              <div>
                <p class="eyebrow">今日资源</p>
                <h2>今天直接用这些资源开始</h2>
              </div>
            </div>
            <ol class="card-list" id="today-resources"></ol>
          </section>
        </section>

        <section class="panel panel--subtle">
          <div class="section-heading">
            <div>
              <p class="eyebrow">完成区</p>
              <h2>完成今天学习后，就更新到下一天。</h2>
              <p class="support-copy">先做完今天这 3 个动作，再结束今天，不需要额外跳去别的地方找说明。</p>
            </div>
          </div>
          <a class="primary-action primary-action--wide" href="/completion.html">完成今天学习</a>
        </section>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
